name: Constitution Sync

on:
  push:
    branches: [main]
    paths:
      - soul.md
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    name: Dispatch constitution update to all colonies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute soul.md hash
        id: hash
        run: echo "sha=$(sha256sum soul.md | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Dispatch to THEHIVE
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.COLONY_DISPATCH_TOKEN }}
          repository: TehutiRaEl/THEHIVE
          event-type: constitution_update
          client-payload: '{"soul_md_hash":"${{ steps.hash.outputs.sha }}","queen_ref":"${{ github.sha }}"}'

      - name: Dispatch to aether
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.COLONY_DISPATCH_TOKEN }}
          repository: TehutiRaEl/aether
          event-type: constitution_update
          client-payload: '{"soul_md_hash":"${{ steps.hash.outputs.sha }}","queen_ref":"${{ github.sha }}"}'

      - name: Dispatch to automatisch
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.COLONY_DISPATCH_TOKEN }}
          repository: TehutiRaEl/automatisch
          event-type: constitution_update
          client-payload: '{"soul_md_hash":"${{ steps.hash.outputs.sha }}","queen_ref":"${{ github.sha }}"}'

      - name: Dispatch to LocalAGI
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.COLONY_DISPATCH_TOKEN }}
          repository: TehutiRaEl/LocalAGI
          event-type: constitution_update
          client-payload: '{"soul_md_hash":"${{ steps.hash.outputs.sha }}","queen_ref":"${{ github.sha }}"}'

      - name: Dispatch to Kimi-K2
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.COLONY_DISPATCH_TOKEN }}
          repository: TehutiRaEl/Kimi-K2
          event-type: constitution_update
          client-payload: '{"soul_md_hash":"${{ steps.hash.outputs.sha }}","queen_ref":"${{ github.sha }}"}'

      - name: Dispatch to NAR2
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.COLONY_DISPATCH_TOKEN }}
          repository: TehutiRaEl/NAR2
          event-type: constitution_update
          client-payload: '{"soul_md_hash":"${{ steps.hash.outputs.sha }}","queen_ref":"${{ github.sha }}"}'

      - name: Dispatch to 4DBRAIN
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.COLONY_DISPATCH_TOKEN }}
          repository: TehutiRaEl/4DBRAIN
          event-type: constitution_update
          client-payload: '{"soul_md_hash":"${{ steps.hash.outputs.sha }}","queen_ref":"${{ github.sha }}"}'

      - name: Update hive.yml with new hash
        run: |
          sed -i "s/soul_md_hash: .*/soul_md_hash: \"${{ steps.hash.outputs.sha }}\"/" hive.yml
          git config user.name "Sovereign Hive Bot"
          git config user.email "bot@sovereignhive.io"
          git add hive.yml
          git diff --staged --quiet || git commit -m "chore: update soul.md hash to ${{ steps.hash.outputs.sha }}"
          git push

name: Sync Secrets to All Colonies

on:
  workflow_dispatch:  # This lets you run it manually by clicking a button
  push:
    paths:
      - '.github/workflows/sync-secrets.yml'  # Also runs when this file is changed

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
       - name: Checkout repository
         uses: actions/checkout@v4

       - name: Sync secrets to all colonies
         uses: xt0rted/secrets-sync@v2
         with:
           github_token: ${{ secrets.SECRET_SYNC_TOKEN }}
           repositories: |
             aether
             4dbrain
             localagi
             kimi-k2
             nar2
           secrets: |
             COLONY_DISPATCH_TOKEN

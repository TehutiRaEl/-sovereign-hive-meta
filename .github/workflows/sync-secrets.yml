name: Sync Secrets to All Colonies

on:
  workflow_dispatch:  # This lets you run it manually by clicking a button
  push:
    paths:
      - '.github/workflows/sync-secrets.yml'  # Also runs when this file is changed

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync secrets to all colonies
        uses: jpoehnelt/secrets-sync-action@v1.10.0
        with:
          # The token that has permission to write secrets to the other repos
          github_token: ${{ secrets.SECRET_SYNC_TOKEN }}
          # The list of repositories to copy secrets to
          repositories: |
            TehutiRaEl/THEHIVE
            TehutiRaEl/automatisch
            TehutiRaEl/aether
            TehutiRaEl/4dbrain
            TehutiRaEl/localagi
            TehutiRaEl/kimi-k2
            TehutiRaEl/nar2
          # The secrets to copy from this repo to all the others
          secrets: |
            COLONY_DISPATCH_TOKEN
            # Add any other secrets here that you want to share with ALL colonies
